<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pipe Pay logo — light mode variant (royal blue on transparent).
  Combines the mark (mirrored from pipepay-child/partials/logo-svg.php) with
  the "Pipe Pay" wordmark in a single self-contained SVG, sized for email.
  Font-family stack includes Arial / Helvetica fallback so glyphs render even
  when Manrope/Inter haven't loaded.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-label="Pipe Pay">
  <!-- Mark: scaled from 64x64 to fit a 64x64 box on the left, vertically centered in the 80px viewBox -->
  <g transform="translate(8, 8)">
    <rect x="2"  y="26" width="8" height="12" fill="#1336a8"/>
    <rect x="9"  y="22" width="3" height="20" fill="#1336a8"/>
    <rect x="54" y="26" width="8" height="12" fill="#1336a8"/>
    <rect x="52" y="22" width="3" height="20" fill="#1336a8"/>
    <path d="M 12 32 L 32 14" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 12 32 L 22 32" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 12 32 L 32 50" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 52 32 L 32 14" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 52 32 L 42 32" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 52 32 L 32 50" stroke="#1336a8" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="12" cy="32" r="1.8" fill="#1336a8"/>
    <circle cx="52" cy="32" r="1.8" fill="#1336a8"/>
    <circle cx="32" cy="32" r="10.5" fill="#1336a8"/>
    <circle cx="32" cy="32" r="8.8"  fill="#ffffff"/>
    <text x="32" y="38" text-anchor="middle" font-family="'Manrope', 'Inter', Arial, Helvetica, sans-serif" font-size="17" font-weight="900" fill="#1336a8">$</text>
  </g>
  <!-- Wordmark: "Pipe Pay" -->
  <text x="92" y="52" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-1" fill="#1336a8">Pipe Pay</text>
</svg>
